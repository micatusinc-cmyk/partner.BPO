<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>対応メモ入力</title>
<style>
  :root{
    --bg:#f2f2f7;
    --card:#ffffff;
    --line:#e5e5ea;
    --text:#1c1c1e;
    --sub:#8e8e93;
    --accent:#007aff;
    --danger:#ff3b30;
    --danger-bg:#fff1f0;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;
    color:var(--text);
    padding:24px 16px 60px;
  }
  .wrap{
    max-width:520px;
    margin:0 auto;
  }
  h1{
    font-size:20px;
    font-weight:700;
    text-align:center;
    margin:0 0 18px;
    letter-spacing:0.02em;
  }
  .card{
    background:var(--card);
    border-radius:14px;
    overflow:hidden;
    box-shadow:0 1px 2px rgba(0,0,0,0.04);
  }
  .field{
    padding:12px 16px;
    border-bottom:1px solid var(--line);
  }
  .field:last-child{
    border-bottom:none;
  }
  label{
    display:block;
    font-size:12px;
    color:var(--sub);
    margin-bottom:4px;
    font-weight:600;
  }
  .datetime-display{
    font-size:16px;
    color:var(--text);
    padding:2px 0;
  }
  input[type="text"]{
    width:100%;
    border:none;
    outline:none;
    font-size:16px;
    color:var(--text);
    background:transparent;
    padding:2px 0;
    font-family:inherit;
  }
  textarea{
    width:100%;
    border:none;
    outline:none;
    resize:none;
    overflow:hidden;
    font-size:16px;
    color:var(--text);
    background:transparent;
    line-height:1.5;
    padding:2px 0;
    font-family:inherit;
    min-height:24px;
  }
  .btn-row{
    display:flex;
    gap:10px;
    margin-top:18px;
  }
  button{
    flex:1;
    border:none;
    border-radius:12px;
    padding:14px 0;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
    -webkit-tap-highlight-color:transparent;
    transition:opacity 0.15s ease;
  }
  button:active{
    opacity:0.6;
  }
  #copyBtn{
    background:var(--accent);
    color:#fff;
  }
  #clearBtn{
    background:var(--danger-bg);
    color:var(--danger);
  }
  .toast{
    position:fixed;
    bottom:30px;
    left:50%;
    transform:translateX(-50%) translateY(20px);
    background:rgba(28,28,30,0.92);
    color:#fff;
    padding:10px 20px;
    border-radius:20px;
    font-size:14px;
    opacity:0;
    pointer-events:none;
    transition:opacity 0.2s ease, transform 0.2s ease;
  }
  .toast.show{
    opacity:1;
    transform:translateX(-50%) translateY(0);
  }
</style>
</head>
<body>
<div class="wrap">
  <h1>対応メモ入力</h1>
  <div class="card">
    <div class="field">
      <label for="date">日時</label>
      <div id="date" class="datetime-display"></div>
    </div>
    <div class="field">
      <label for="property">物件名</label>
      <input type="text" id="property" placeholder="例：〇〇マンション">
    </div>
    <div class="field">
      <label for="name">名前</label>
      <input type="text" id="name" placeholder="お客様名・担当者名など">
    </div>
    <div class="field">
      <label for="phone">電話番号</label>
      <input type="text" id="phone" placeholder="例：090-1234-5678">
    </div>
    <div class="field">
      <label for="histField">対応履歴</label>
      <textarea id="histField" rows="1" placeholder="対応内容を入力"></textarea>
    </div>
  </div>

  <div class="btn-row">
    <button id="copyBtn">コピー</button>
    <button id="clearBtn">クリア</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  // textarea自動リサイズ
  const histField = document.getElementById('histField');
  function autoResize(el){
    el.style.height = 'auto';
    el.style.height = el.scrollHeight + 'px';
  }
  histField.addEventListener('input', () => autoResize(histField));

  function showToast(msg){
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 1500);
  }

  function formatDateTime(d){
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, '0');
    const day = String(d.getDate()).padStart(2, '0');
    const h = String(d.getHours()).padStart(2, '0');
    const min = String(d.getMinutes()).padStart(2, '0');
    return `${y}/${m}/${day} ${h}:${min}`;
  }

  function updateDisplay(){
    document.getElementById('date').textContent = formatDateTime(new Date());
  }
  updateDisplay();
  setInterval(updateDisplay, 10000);

  document.getElementById('copyBtn').addEventListener('click', () => {
    const date = formatDateTime(new Date());
    const property = document.getElementById('property').value;
    const name = document.getElementById('name').value;
    const phone = document.getElementById('phone').value;
    const hist = document.getElementById('histField').value;

    const text =
`${date}
-------------
${property}
-------------
${name}
-------------
${phone}
-------------
${hist}
-------------`;

    navigator.clipboard.writeText(text).then(() => {
      showToast('コピーしました');
    }).catch(() => {
      // フォールバック
      const ta = document.createElement('textarea');
      ta.value = text;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      showToast('コピーしました');
    });
  });

document.getElementById('clearBtn').addEventListener('click', () => {
    document.getElementById('property').value = '';
    document.getElementById('name').value = '';
    document.getElementById('phone').value = '';
    histField.value = '';
    autoResize(histField);
    showToast('クリアしました');
  });
</script>
</body>
</html>
